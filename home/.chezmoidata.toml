# Shared template data, tracked in the repo.
# Per-host hardware facts live here (they're config, not secrets); templates
# look them up with: index .hosts .chezmoi.hostname

# grodarch: 3x ASUS VG27A 2560x1440@144.
# wayland = DRM connector name (Hyprland), x11 = nvidia Xorg name.
# Mapping verified 2026-07-19 against `hyprctl monitors` (real panel serials
# are visible under KMS): DP-2=left/M1LMQS109598, DP-3=middle/L6LMQS143616,
# DP-1=right/KCLMQS100054.
[[hosts.grodarch.monitors]]
wayland = "DP-2"
x11 = "DP-2"
mode = "2560x1440@144"
pos = "0x0"

[[hosts.grodarch.monitors]]
wayland = "DP-3"
x11 = "DP-4"
mode = "2560x1440@144"
pos = "2560x0"
primary = true

[[hosts.grodarch.monitors]]
wayland = "DP-1"
x11 = "DP-0"
mode = "2560x1440@144"
pos = "5120x0"
