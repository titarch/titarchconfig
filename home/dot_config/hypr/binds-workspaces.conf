# workspace ids interleave so primed sorts next to its partner:
# N -> id 2N-1 (name N), primed N -> id 2N (name N')

workspace = 1, defaultName:1
workspace = 2, defaultName:1'
workspace = 3, defaultName:2
workspace = 4, defaultName:2'
workspace = 5, defaultName:3
workspace = 6, defaultName:3'
workspace = 7, defaultName:4
workspace = 8, defaultName:4'
workspace = 9, defaultName:5
workspace = 10, defaultName:5'
workspace = 11, defaultName:6
workspace = 12, defaultName:6'
workspace = 13, defaultName:7
workspace = 14, defaultName:7'
workspace = 15, defaultName:8
workspace = 16, defaultName:8'
workspace = 17, defaultName:9
workspace = 18, defaultName:9'
workspace = 19, defaultName:10
workspace = 20, defaultName:10'
workspace = 21, defaultName:11
workspace = 22, defaultName:11'
workspace = 23, defaultName:12
workspace = 24, defaultName:12'

# binds for 2-12, the four N=1 examples live in hyprland.conf
bind = $mod, 2, workspace, 3
bind = $mod $alt, 2, workspace, 4
bind = $mod SHIFT, 2, movetoworkspace, 3
bind = $mod SHIFT $alt, 2, movetoworkspace, 4
bind = $mod, 3, workspace, 5
bind = $mod $alt, 3, workspace, 6
bind = $mod SHIFT, 3, movetoworkspace, 5
bind = $mod SHIFT $alt, 3, movetoworkspace, 6
bind = $mod, 4, workspace, 7
bind = $mod $alt, 4, workspace, 8
bind = $mod SHIFT, 4, movetoworkspace, 7
bind = $mod SHIFT $alt, 4, movetoworkspace, 8
bind = $mod, 5, workspace, 9
bind = $mod $alt, 5, workspace, 10
bind = $mod SHIFT, 5, movetoworkspace, 9
bind = $mod SHIFT $alt, 5, movetoworkspace, 10
bind = $mod, 6, workspace, 11
bind = $mod $alt, 6, workspace, 12
bind = $mod SHIFT, 6, movetoworkspace, 11
bind = $mod SHIFT $alt, 6, movetoworkspace, 12
bind = $mod, 7, workspace, 13
bind = $mod $alt, 7, workspace, 14
bind = $mod SHIFT, 7, movetoworkspace, 13
bind = $mod SHIFT $alt, 7, movetoworkspace, 14
bind = $mod, 8, workspace, 15
bind = $mod $alt, 8, workspace, 16
bind = $mod SHIFT, 8, movetoworkspace, 15
