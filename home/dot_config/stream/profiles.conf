# stream profiles — one per Moonlight client
# name = WIDTHxHEIGHT@REFRESH
# Any resolution works: the stream script generates the mode on the fly
# (cvt + xrandr --newmode/--addmode). A name can also alias another
# profile (see 'default').

laptop    = 1920x1080@60
thinkpad  = 1920x1200@60
qhd       = 2560x1440@60
ultrawide = 3440x1440@60
tv4k      = 3840x2160@60
default   = qhd
phone     = 2400x1080@60
