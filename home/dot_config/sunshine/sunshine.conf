# Sunshine host config — managed by chezmoi, EXCEPT capture/output_name:
# the `stream` script rewrites those two lines at runtime to match the
# session (Hyprland: wlr + the discovered HEADLESS-* name; X11: x11 + index
# 0, where the virtual head is the only active monitor). `chezmoi diff`
# noise on those lines is expected.
capture = wlr
encoder = nvenc
output_name = HEADLESS-2
