# kitty config. option reference: https://sw.kovidgoyal.net/kitty/conf/
# machine-specific bits live in fx.conf (templated, included last).

# --- font (size is per-machine, set in fx.conf) ---
font_family      Fira Code Retina
bold_font        auto
italic_font      auto
bold_italic_font auto

# --- cursor (no-cursor: we drive the shape ourselves, not the shell) ---
shell_integration no-cursor
cursor_shape block
cursor_trail 3
cursor_trail_decay 0.1 0.4

# --- bell / window ---
enable_audio_bell no
window_padding_width 6

# --- keymaps ---
map ctrl+alt+n new_os_window_with_cwd

# --- theme, then machine-specific overrides (last include wins) ---
include dracula.conf
include fx.conf
