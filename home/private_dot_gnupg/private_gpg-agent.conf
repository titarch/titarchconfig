# themed passphrase prompt: pinentry-qt picks up the qt6ct dracula palette,
# the default gtk/gnome3 pinentry renders light and clashes
pinentry-program /usr/bin/pinentry-qt

# cache the card PIN for a workday so it isn't re-prompted constantly; the
# yubikey touch policy is the real per-use gate (set sig touch to `cached`)
default-cache-ttl 28800
max-cache-ttl 28800
