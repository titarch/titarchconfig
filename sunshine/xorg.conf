# nvidia-xconfig: X configuration file generated by nvidia-xconfig
# nvidia-xconfig:  version 530.41.03
#
# Modified for Sunshine virtual displays: HDMI-0 (physically unused
# connector) is force-connected with relaxed mode validation so the
# `stream` script can enable a virtual screen with plain xrandr, no X
# restart. Modes are created at runtime by the stream script
# (AllowNonEdidModes makes the driver accept xrandr --newmode/--addmode —
# verified on driver 610.43.03).
# WARNING: do NOT force-connect DP-1/DP-3/DP-5 — they are sibling heads of
# the connectors driving the real monitors, and forcing them breaks DP
# link training (monitors stay dark after the initial modeset).
# Deployed to /etc/X11/xorg.conf

Section "ServerLayout"
    Identifier     "Layout0"
    Screen      0  "Screen0"
    InputDevice    "Keyboard0" "CoreKeyboard"
    InputDevice    "Mouse0" "CorePointer"
EndSection

Section "Files"
EndSection

Section "InputDevice"
    # generated from default
    Identifier     "Mouse0"
    Driver         "mouse"
    Option         "Protocol" "auto"
    Option         "Device" "/dev/psaux"
    Option         "Emulate3Buttons" "no"
    Option         "ZAxisMapping" "4 5"
EndSection

Section "InputDevice"
    # generated from default
    Identifier     "Keyboard0"
    Driver         "kbd"
EndSection

Section "Monitor"
    Identifier     "Monitor0"
    VendorName     "Unknown"
    ModelName      "Unknown"
    Option         "DPMS"
    # Modeline pool for the virtual display (HDMI-0). Modelines declared in
    # the Screen's Monitor section are validated at startup for every display
    # device (this is the mechanism the old 20-sunshine-virtual.conf used).
    # Driver-known modes can be SET at any pixel clock; only runtime
    # xrandr-added modes are subject to the head's raw pixel-clock cap.
    # Reduced-blanking (cvt -r) keeps the pixel clocks low; nothing is
    # physically driven on the virtual head anyway.
    # To add a resolution: cvt -r <w> <h> 60, name it "WxH_60", restart X.
    Modeline "1920x1080_60"   138.50  1920 1968 2000 2080  1080 1083 1088 1111 +hsync -vsync
    Modeline "1920x1200_60"   154.00  1920 1968 2000 2080  1200 1203 1209 1235 +hsync -vsync
    Modeline "2560x1080_60"   181.25  2560 2608 2640 2720  1080 1083 1093 1111 +hsync -vsync
    Modeline "2560x1440_60"   241.50  2560 2608 2640 2720  1440 1443 1448 1481 +hsync -vsync
    Modeline "2560x1600_60"   268.50  2560 2608 2640 2720  1600 1603 1609 1646 +hsync -vsync
    Modeline "3440x1440_60"   319.75  3440 3488 3520 3600  1440 1443 1453 1481 +hsync -vsync
    Modeline "3840x2160_60"   533.00  3840 3888 3920 4000  2160 2163 2168 2222 +hsync -vsync
    Modeline "1920x1080_120"  369.50  1920 2080 2288 2656  1080 1083 1088 1160 -hsync +vsync
    Modeline "2560x1440_120"  661.25  2560 2784 3064 3568  1440 1443 1448 1545 -hsync +vsync
EndSection

Section "Device"
    Identifier     "Device0"
    Driver         "nvidia"
    VendorName     "NVIDIA Corporation"
    # ConnectedMonitor REPLACES detection: every output that should appear
    # connected must be listed — the 3 physical panels plus the virtual head.
    Option         "ConnectedMonitor" "DP-0, DP-2, DP-4, HDMI-0"
    # Without an EDID the driver caps an HDMI head at single-link TMDS
    # (165 MHz pixel clock) and rejects bigger runtime modes with BadMatch.
    # Feeding it a real QHD-144 EDID (600 MHz max dotclock, extracted from
    # one of the VG27A panels) lifts the cap for e.g. 3440x1440@60 and 4K.
    # EDIDs live in the repo so updating them never needs sudo — just edit
    # and restart X. The real panels (VG27A) also get a pinned EDID
    # (vg27a-edid.bin, extracted from DP-4): when X starts while the
    # monitors are asleep, DDC reads fail and the outputs would otherwise
    # only offer basic fallback modes, breaking `stream off`'s restore
    # after a remote/cold boot.
    Option         "CustomEDID" "HDMI-0:/home/bparsy/titarchconfig/sunshine/virtual-edid.bin; DP-0:/home/bparsy/titarchconfig/sunshine/vg27a-edid.bin; DP-2:/home/bparsy/titarchconfig/sunshine/vg27a-edid.bin; DP-4:/home/bparsy/titarchconfig/sunshine/vg27a-edid.bin"
    # Relax validation ONLY on the virtual head so arbitrary CVT modelines are
    # accepted (nothing is actually driven on it).
    Option         "ModeValidation" "HDMI-0: NoMaxPClkCheck, NoEdidMaxPClkCheck, NoMaxSizeCheck, NoHorizSyncCheck, NoVertRefreshCheck, NoVirtualSizeCheck, AllowNonEdidModes"
EndSection

Section "Screen"
    Identifier     "Screen0"
    Device         "Device0"
    Monitor        "Monitor0"
    DefaultDepth    24
    SubSection     "Display"
        Depth       24
    EndSubSection
    Option         "MetaModes" "DP-2: 2560x1440_144 +0+0 {ForceCompositionPipeline=On}, DP-4: 2560x1440_144 +2560+0 {ForceCompositionPipeline=On}, DP-0: 2560x1440_144 +5120+0 {ForceCompositionPipeline=On}"
    Option         "AllowIndirectGLXProtocol" "off"
    Option         "TripleBuffer" "on"
EndSection
