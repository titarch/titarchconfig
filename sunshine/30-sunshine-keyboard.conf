# Deployed to /etc/X11/xorg.conf.d/30-sunshine-keyboard.conf
# Sunshine's virtual keyboard ("Keyboard passthrough") receives raw
# scancodes from Moonlight clients, bypassing both the clients' own
# caps/esc swaps and grodarch's caps2esc (which only hooks the physical
# SONiX keyboard). Swap them here at the X level for this device only,
# so streaming feels like every other keyboard. Options must repeat
# compose:rwin from 00-keyboard.conf (same-name options override, they
# don't merge).
Section "InputClass"
    Identifier "sunshine-virtual-keyboard"
    MatchProduct "Keyboard passthrough"
    MatchIsKeyboard "on"
    Option "XkbOptions" "compose:rwin,caps:swapescape"
EndSection
