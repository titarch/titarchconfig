# monitor layout for the greeter's own hyprland instance (passed via -C),
# without it monitors are auto-placed in connector order (right screen first)
monitor = DP-2, 2560x1440@144, 0x0, 1
monitor = DP-3, 2560x1440@144, 2560x0, 1
monitor = DP-1, 2560x1440@144, 5120x0, 1

misc {
    disable_hyprland_logo = true
}

exec-once = hypridle -c /etc/greetd/hypridle-greeter.conf
